services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-acmoj}
      POSTGRES_USER: ${POSTGRES_USER:-acmoj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acmoj} -d ${POSTGRES_DB:-acmoj}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - testcase_data:/data/testcases
      - static_data:/app/staticfiles
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  judge:
    build:
      context: ./judge
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - backend
      - redis
    volumes:
      - testcase_data:/data/testcases:ro
      - judge_runs:/judge/run
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["python", "worker.py"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE: /api
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: docker.1ms.run/library/nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/static:ro

volumes:
  postgres_data:
    name: acmoj_prod_postgres_data
  redis_data:
    name: acmoj_prod_redis_data
  testcase_data:
    name: acmoj_prod_testcase_data
  judge_runs:
    name: acmoj_prod_judge_runs
  static_data:
    name: acmoj_prod_static_data
